name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 🚨 Run frontend tests
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install frontend dependencies
      working-directory: ./poolleaderboard.client
      run: npm ci 

    - name: Run frontend tests
      working-directory: ./poolleaderboard.client
      run: npm run test:ci

    - name: Run backend tests
      run: dotnet test

    # 🐳 Docker build & push (runs only if tests pass)
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -f PoolLeaderboard.Server/Dockerfile -t ghcr.io/richardcastle15/poolleaderboard:latest .

    - name: Push Docker image
      run: |
        docker push ghcr.io/richardcastle15/poolleaderboard:latest
